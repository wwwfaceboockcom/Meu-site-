<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    margin: 0;
    padding: 0;
}

/* Caixa de login */
.login-box {
    width: 90%;
    max-width: 350px;
    margin: 80px auto;
    background: #fff;
    padding: 25px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

/* Logo */
#logo {
    width: 120px;
    margin-bottom: 15px;
}

/* Inputs */
input {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* Botão */
button {
    width: 95%;
    padding: 12px;
    background: #4267B2;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #365899;
}

/* Mensagem */
#msg {
    margin-top: 15px;
    color: green;
    display: none;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- LOGO -->
    <img src="static/images.png" alt="Logo" id="logo">

    <h2>Bem-vindo</h2>

    <!-- FORMULÁRIO -->
    <form onsubmit="return login()">
        <input type="text" id="user" placeholder="Usuário" required>
        <input type="password" id="pass" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

    <p id="msg">Login enviado com sucesso ✅</p>

</div>

<!-- SCRIPT -->
<script>
function login() {
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user && pass){
        document.getElementById("msg").style.display = "block";
    }

    return false; // impede reload da página
}
</script>

</body>
</html>
