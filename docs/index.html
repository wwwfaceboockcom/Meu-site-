<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4267B2;
            color: white;
            padding: 20px 0;
        }

        #logo {
            width: 150px;
            height: auto;
        }

        main {
            padding: 40px 20px;
        }

        form {
            display: inline-block;
            margin-top: 20px;
            text-align: left;
        }

        input[type="text"], input[type="password"] {
            width: 250px;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #4267B2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #365899;
        }

        footer {
            margin-top: 40px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <img src="static/images.png"> alt="Logo" id="logo">
        <h1>Bem-vindo ao Meu Site</h1>
    </header>

    <main>
        <p>Conteúdo do site aqui...</p>

        <form action="#" method="POST">
            <label for="user">Usuário:</label><br>
            <input type="text" id="user" name="user" placeholder="Digite seu usuário"><br>

            <label for="pass">Senha:</label><br>
            <input type="password" id="pass" name="pass" placeholder="Digite sua senha"><br>

            <input type="submit" value="Entrar">
        </form>
    </main>

    <footer>
        &copy; 2026 Meu Site
    </footer>
</body>
</html>
