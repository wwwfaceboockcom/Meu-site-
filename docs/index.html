cat > docs/index.html << 'EOF'
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body {
    font-family: Arial;
    background: #f0f2f5;
}
.login-box {
    width: 300px;
    margin: 80px auto;
    background: #fff;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
}
img {
    width: 100px;
    margin-bottom: 20px;
}
input {
    width: 90%;
    padding: 10px;
    margin: 8px;
}
button {
    width: 95%;
    padding: 10px;
    background: #007BFF;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="login-box">
    <img src="static/mnvc3.png">
    <form>
        <input type="text" placeholder="Usuário">
        <input type="password" placeholder="Senha">
        <button>Entrar</button>
    </form>
</div>

</body>
</html>
EOF
